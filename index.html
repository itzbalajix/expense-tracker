<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger - Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="expense-tracker.css">
</head>
<body>
  
  <div class="app">

    <div class="header">
      <h1>Ledger</h1>
      <span class="header-badge">Expense Tracker</span>
    </div>

    <div class="summary" aria-label="Financial Summary">
      <div class="balance-card">
        <div class="card-label">Total Balance</div>
        <div class="balance-amount zero" id="balance">₹0.00</div>
      </div>

      <div class="mini-card income-card">
        <div class="card-label">Income</div>
        <div class="mini-amount" id="total-income">₹0.00</div>
      </div>

      <div class="mini-card expense-card">
        <div class="card-label">Expenses</div>
        <div class="mini-amount" id="total-expenses">₹0.00</div>
      </div>
    </div>

    <div class="panel" aria-label="Add Transcation">
      <div class="panel-title">New Transaction</div>
      <div class="form-grid">
        <div class="form-group full">
          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="eg. Grocery run, Salary..." maxlength="60" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="amount">Amount (+ income / -expense)</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="General">General</option>
            <option value="Food">🍔 Food</option>
            <option value="Gym">🏋🏻‍♀️ Gym</option>
            <option value="Salary">💼 Salary</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Health">🏥 Health</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Bills">🧾 Bills</option>
            <option value="Investment">📈 Investment</option>
            <option value="Party">🪩 Party</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <button class="btn-add" id="btn-add">+ Add Transaction</button>
      </div>
    </div> 

        <div aria-label="Transaction History">
          <div class="list-header">
            <div class="list-title">History</div>
            <span class="list-count" id="tx-count">0 entries</span>
          </div>
          <div id="tx-container"></div>
        </div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>

   <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.13/dayjs.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.13/plugin/relativeTime.min.js"></script>
  <script src="expense-tracker.js" type="module"></script>
</body>
</html>
